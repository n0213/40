<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하늘고등학교 일러스트 갤러리</title>
    <style>
        :root {
            --bg: #faf8f5;
            --white: #ffffff;
            --accent: #68809a;
            --text: #2b2b2b;
            --sub: #666666;
            --border: #e6e1da;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 15px;
            color: var(--sub);
        }

        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 50px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--sub);
            transition: all 0.2s;
        }

        .tab-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .tab-btn.active {
            background: var(--text);
            color: var(--white);
            border-color: var(--text);
        }

        .gallery-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .img-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            cursor: zoom-in;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .img-card:hover img {
            transform: scale(1.03);
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f0ede6;
            color: #aaa;
            font-size: 13px;
        }

        .cover-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-card {
            width: 100%;
            max-width: 400px; /* 표지 크기 축소 */
            aspect-ratio: 50 / 85; 
        }

        .scene-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .scene-card {
            width: 100%;
            aspect-ratio: 16 / 9; 
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 15px 15px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .img-card:hover .overlay {
            opacity: 1;
        }

        .file-name {
            color: var(--white);
            font-size: 13px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .download-btn {
            background: var(--white);
            color: var(--text);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
            pointer-events: auto;
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            object-fit: contain;
            cursor: zoom-out;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .close-modal:hover {
            color: #ccc;
        }

        @media (max-width: 600px) {
            .scene-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .overlay {
                opacity: 1;
                background: rgba(0,0,0,0.6);
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px;
            }
            .download-btn {
                width: 100%;
                text-align: center;
            }
            .close-modal {
                top: 10px;
                right: 20px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>하늘고등학교 갤러리</h1>
        <p>캐릭터별 표지 및 상황 일러스트 모음</p>
    </div>

    <div class="tabs" id="tabs-container"></div>

    <div class="gallery-wrapper">
        <div class="cover-area">
            <h2 class="section-title" id="cover-title">메인 표지</h2>
            <div id="cover-container"></div>
        </div>

        <div class="scene-area">
            <h2 class="section-title">상황 일러스트 (1~16)</h2>
            <div class="scene-grid" id="scene-container"></div>
        </div>
    </div>

    <div id="image-modal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-img" onclick="event.stopPropagation(); closeModal();">
    </div>

    <script>
        const characters = ['여름', '서원', '태현', '소원', '지연', '서린', '하영', '명아'];
        const ext = '.png'; 

        window.onload = () => {
            renderTabs();
            loadGallery(characters[0]);
        };

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            characters.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = char;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadGallery(char);
                };
                container.appendChild(btn);
            });
            container.firstChild.classList.add('active');
        }

        function createCardHTML(fileName, cardClass) {
            return `
                <div class="img-card ${cardClass}" onclick="openModal('./${fileName}')">
                    <img src="./${fileName}" alt="${fileName}" onerror="this.outerHTML='<div class=\\'placeholder\\'>이미지 없음<br><small>${fileName}</small></div>'">
                    <div class="overlay">
                        <span class="file-name">${fileName}</span>
                        <button class="download-btn" onclick="forceDownload('${fileName}', event)">저장</button>
                    </div>
                </div>
            `;
        }

        function loadGallery(charName) {
            const coverContainer = document.getElementById('cover-container');
            const sceneContainer = document.getElementById('scene-container');
            
            coverContainer.innerHTML = '';
            sceneContainer.innerHTML = '';
            document.getElementById('cover-title').innerText = `${charName} 표지`;

            const coverFile = `${charName}_표지${ext}`;
            coverContainer.innerHTML = createCardHTML(coverFile, 'cover-card');

            let sceneHTML = '';
            for (let i = 1; i <= 16; i++) {
                const sceneFile = `${charName}_${i}${ext}`;
                sceneHTML += createCardHTML(sceneFile, 'scene-card');
            }
            sceneContainer.innerHTML = sceneHTML;
        }

        function openModal(src) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            modal.classList.add('show');
        }

        function closeModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('show');
        }

        // 사용자 제스처 컨텍스트 유지 + Blob 다운로드
        function forceDownload(fileName, event) {
            event.preventDefault();
            event.stopPropagation();

            // 제스처 컨텍스트 안에서 즉시 a 태그 준비
            const a = document.createElement('a');
            a.download = fileName;
            document.body.appendChild(a);

            fetch('./' + fileName)
                .then(r => {
                    if (!r.ok) throw new Error('fetch 실패');
                    return r.blob();
                })
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    a.href = blobUrl;
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
                })
                .catch(() => {
                    document.body.removeChild(a);
                    // 최후 수단: 새 탭 + 안내
                    window.open('./' + fileName, '_blank');
                    alert('열린 이미지에서 길게 눌러 → 이미지 저장을 선택해 주세요.');
                });
        }
    </script>

</body>
</html>
